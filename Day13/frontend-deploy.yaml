apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: fontend-deploy
  name: fontend-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fontend
  template:
    metadata:
      labels:
        app: fontend
    spec:
      containers:
      - image: nginx
        name: nginx
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: fontend-deploy
  name: frontend-svc
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
    nodePort: 31000
  selector:
    app: fontend
  type: NodePort
status:
  loadBalancer: {}
